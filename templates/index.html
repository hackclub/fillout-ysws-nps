<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{.Title}}</title>
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: linear-gradient(135deg, #ec3750 0%, #ff8c37 100%);
      color: #fff;
    }
    main {
      text-align: center;
      padding: 2.5rem 3rem;
      background: rgba(0, 0, 0, 0.18);
      border-radius: 16px;
      backdrop-filter: blur(6px);
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.25);
    }
    h1 { margin: 0 0 0.5rem; font-size: 2.25rem; }
    p { margin: 0.25rem 0; opacity: 0.95; }
    .badge {
      display: inline-block;
      margin-top: 1rem;
      padding: 0.35rem 0.75rem;
      font-size: 0.85rem;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.2);
    }
    footer { margin-top: 1.5rem; font-size: 0.8rem; opacity: 0.8; }
  </style>
</head>
<body>
  <main>
    <h1>{{.Title}}</h1>
    <p>Your Go webapp is up and running.</p>
    <span class="badge">It works!</span>
    <footer>&copy; {{.Year}} Hack Club</footer>
  </main>
</body>
</html>
