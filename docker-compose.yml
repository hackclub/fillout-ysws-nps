# Project name prefixes all containers, networks, and volumes. Override it
# (and the host ports below) per checkout so multiple dev environments on one
# machine stay isolated. Values come from .env — see .env.example.
name: ${COMPOSE_PROJECT_NAME:-fillout-ysws-nps}

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    environment:
      PORT: "8080"
      DATABASE_URL: "postgres://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-app}@db:5432/${POSTGRES_DB:-app}?sslmode=disable"
      FILLOUT_API_KEY: ${FILLOUT_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      AIRTABLE_API_KEY: ${AIRTABLE_API_KEY:-}
      AIRTABLE_BASE_ID: ${AIRTABLE_BASE_ID:-}
      NPS_TABLE: ${NPS_TABLE:-NPS}
      NPS_POLL_INTERVAL: ${NPS_POLL_INTERVAL:-30s}
      ALLOWED_EMAILS: ${ALLOWED_EMAILS:-}
      SESSION_SECRET: ${SESSION_SECRET:-}
      HC_AUTH_CLIENT_ID: ${HC_AUTH_CLIENT_ID:-}
      HC_AUTH_CLIENT_SECRET: ${HC_AUTH_CLIENT_SECRET:-}
      HC_AUTH_CALLBACK_BASE_URL: ${HC_AUTH_CALLBACK_BASE_URL:-http://localhost:3000}
    ports:
      # host -> container. Only the host side varies between environments.
      - "${APP_PORT:-8080}:8080"
    volumes:
      - .:/app
      - go-build-cache:/root/.cache/go-build
      - go-mod-cache:/go/pkg/mod
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
      POSTGRES_DB: ${POSTGRES_DB:-app}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-app}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
  go-build-cache:
  go-mod-cache:
